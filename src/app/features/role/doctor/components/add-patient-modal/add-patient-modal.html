<div class="modal" [style.display]="isOpen ? 'flex' : 'none'" (click)="onOutsideClick($event)">
  <div class="modal-content">
    <span class="modal-close" (click)="close()">&times;</span>
    <h2><i class="fas fa-user-plus"></i> Добавить нового пациента</h2>

    <form [formGroup]="addPatientForm" (ngSubmit)="onSubmit()" class="mt-3">
      <div class="form-row">
        <div class="form-group">
          <label for="newFirstName"><i class="fas fa-user"></i> Имя *</label>
          <input type="text" id="newFirstName" formControlName="firstName" />
        </div>
        <div class="form-group">
          <label for="newLastName"><i class="fas fa-user"></i> Фамилия *</label>
          <input type="text" id="newLastName" formControlName="lastName" />
        </div>
      </div>

      <div class="form-group">
        <label for="newBirthDate"><i class="fas fa-calendar"></i> Дата рождения *</label>
        <input type="date" id="newBirthDate" formControlName="birthDate" />
      </div>

      <div class="form-group">
        <label for="newPhone"><i class="fas fa-phone"></i> Телефон *</label>
        <input
          type="tel"
          id="newPhone"
          formControlName="phone"
          (input)="clearPhoneError()"
          [style.border-color]="phoneError ? '#ef4444' : ''"
        />

        @if (phoneError) {
          <span style="color: #ef4444; font-size: 12px; margin-top: 5px; font-weight: 600">
            {{ phoneError }}
          </span>
        }
      </div>

      <div class="form-group">
        <label for="newEmail"><i class="fas fa-envelope"></i> Email *</label>
        <input type="email" id="newEmail" formControlName="email" />
      </div>

      <div class="form-group">
        <label for="newPassword"><i class="fas fa-lock"></i> Пароль *</label>
        <input type="password" id="newPassword" formControlName="password" />
      </div>

      <div class="mt-3">
        <button type="submit" class="btn btn-primary" [disabled]="addPatientForm.invalid">
          <i class="fas fa-save"></i> Добавить пациента
        </button>
        <button type="button" class="btn btn-outline" (click)="close()">
          <i class="fas fa-times"></i> Отменить
        </button>
      </div>
    </form>
  </div>
</div>
