<div class="mt-4">
  <div style="background: #f7fafc; padding: 20px; border-radius: 8px">
    <div style="display: flex; justify-content: space-between; align-items: center">
      <div>
        <strong>Прогресс:</strong>
        <span>{{ currentProgress }}/11 вопросов</span>
      </div>
      <div>
        <strong>Текущий балл:</strong>
        <span class="badge badge-info">{{ totalScore }}/50</span>
      </div>
    </div>

    <div
      style="
        width: 100%;
        height: 8px;
        background: #e2e8f0;
        border-radius: 4px;
        margin-top: 10px;
        overflow: hidden;
      "
    >
      <div
        [style.width.%]="(currentProgress / 11) * 100"
        style="
          height: 100%;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          transition: width 0.3s;
        "
      ></div>
    </div>
  </div>

  <div class="mt-3">
    <button type="button" class="btn btn-primary" [disabled]="!isValid" (click)="onSubmit()">
      <i class="fas fa-paper-plane"></i> Отправить опросник
    </button>
  </div>
</div>
