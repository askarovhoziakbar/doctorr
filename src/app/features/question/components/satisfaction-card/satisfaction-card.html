<div class="question-card mt-3">
  <p class="question-text">
    <span class="question-number">11.</span>
    Насколько вы удовлетворены своим текущим состоянием?
  </p>
  <div class="satisfaction-options">
    <button
      type="button"
      class="satisfaction-btn"
      [class.active]="selectedSatisfaction === 0"
      (click)="select(0)"
    >
      <i class="fas fa-smile"></i><br />Удовлетворен
    </button>

    <button
      type="button"
      class="satisfaction-btn"
      [class.active]="selectedSatisfaction === 1"
      (click)="select(1)"
    >
      <i class="fas fa-meh"></i><br />Да и нет
    </button>

    <button
      type="button"
      class="satisfaction-btn"
      [class.active]="selectedSatisfaction === 2"
      (click)="select(2)"
    >
      <i class="fas fa-frown"></i><br />Не удовлетворен
    </button>
  </div>
</div>
